<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Sửa lịch hẹn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body>


<!-- Header -->
<div th:replace="~{layout/header}"></div>



<div class="d-flex">


    <!-- Sidebar -->
    <div th:replace="~{layout/sidebar}"></div>





    <!-- Nội dung -->
    <div class="container mt-4">


        <h2>Sửa lịch hẹn</h2>




        <form th:action="@{/appointment/save}"
              method="post">



            <!-- Giữ ID để cập nhật -->
            <input type="hidden"
                   name="id"
                   th:value="${appointment.id}">





            <!-- Mã lịch hẹn -->

            <div class="mb-3">

                <label>Mã lịch hẹn</label>

                <input type="text"
                       class="form-control"
                       name="appointmentCode"
                       th:value="${appointment.appointmentCode}"
                       readonly>

            </div>






            <!-- Chọn bệnh nhân -->

            <div class="mb-3">

                <label>Bệnh nhân</label>


                <select name="patientId"
                        class="form-control"
                        required>


                    <option th:each="p : ${patients}"
                            th:value="${p.id}"
                            th:text="${p.fullName}"
                            th:selected="${appointment.patient != null and p.id == appointment.patient.id}">
                    </option>


                </select>


            </div>







            <!-- Ngày hẹn -->

            <div class="mb-3">

                <label>Ngày hẹn</label>


                <input type="date"
                       name="appointmentDate"
                       class="form-control"
                       th:value="${appointment.appointmentDate}"
                       required>


            </div>







            <!-- Giờ hẹn -->

            <div class="mb-3">

                <label>Giờ hẹn</label>


                <input type="time"
                       name="appointmentTime"
                       class="form-control"
                       th:value="${appointment.appointmentTime}"
                       required>


            </div>








            <!-- Trạng thái -->

            <div class="mb-3">

                <label>Trạng thái</label>


                <select name="status"
                        class="form-control">



                    <option value="Chờ khám"
                    th:selected="${appointment.status == 'Chờ khám'}">

                        Chờ khám

                    </option>




                    <option value="Đã check-in"
                    th:selected="${appointment.status == 'Đã check-in'}">

                        Đã check-in

                    </option>





                    <option value="Đang khám"
                    th:selected="${appointment.status == 'Đang khám'}">

                        Đang khám

                    </option>





                    <option value="Hoàn thành"
                    th:selected="${appointment.status == 'Hoàn thành'}">

                        Hoàn thành

                    </option>



                </select>


            </div>








            <!-- Ghi chú -->

            <div class="mb-3">

                <label>Ghi chú</label>


                <textarea name="note"
                          class="form-control"
                          th:text="${appointment.note}">
                </textarea>


            </div>








            <button type="submit"
                    class="btn btn-success">

                Lưu thay đổi

            </button>





            <a href="/appointment"
               class="btn btn-secondary">

                Quay lại

            </a>



        </form>


    </div>


</div>





<!-- Footer -->

<div th:replace="~{layout/footer}"></div>



</body>

</html>
