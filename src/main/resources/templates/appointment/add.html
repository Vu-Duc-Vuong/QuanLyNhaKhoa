<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Thêm lịch hẹn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body>


<div class="container mt-5">


<h2>Thêm lịch hẹn</h2>


<!-- Hiển thị lỗi trùng lịch -->
<div th:if="${error}"
     class="alert alert-danger">

    <span th:text="${error}"></span>

</div>



<form th:action="@{/appointment/save}"
      method="post">



    <!-- Mã lịch hẹn -->
    <div class="mb-3">

        <label>Mã lịch hẹn</label>

        <input type="text"
               name="appointmentCode"
               class="form-control"
               required>

    </div>




    <!-- Chọn bệnh nhân -->
    <div class="mb-3">

        <label>Bệnh nhân</label>


        <select name="patientId"
        class="form-control"
        required>


            <option value="">
                -- Chọn bệnh nhân --
            </option>


            <option th:each="p : ${patients}"
                    th:value="${p.id}"
                    th:text="${p.fullName}">
            </option>


        </select>


    </div>





    <!-- Ngày hẹn -->
    <div class="mb-3">

        <label>Ngày hẹn</label>


        <input type="date"
       name="appointmentDate"
       class="form-control"
       min="2026-01-01"
       required>


    </div>





    <!-- Giờ hẹn -->
    <div class="mb-3">

        <label>Giờ hẹn</label>


        <input type="time"
               name="appointmentTime"
               class="form-control"
               required>


    </div>





    <!-- Trạng thái -->
    <div class="mb-3">

        <label>Trạng thái</label>


        <select name="status"
                class="form-control">


            <option value="Chờ khám">
                Chờ khám
            </option>


            <option value="Đã check-in">
                Đã check-in
            </option>


            <option value="Đang khám">
                Đang khám
            </option>


            <option value="Hoàn thành">
                Hoàn thành
            </option>


        </select>


    </div>





    <!-- Ghi chú -->
    <div class="mb-3">

        <label>Ghi chú</label>


        <textarea name="note"
                  class="form-control">
        </textarea>


    </div>




    <button class="btn btn-success">

        Lưu

    </button>



    <a href="/appointment"
       class="btn btn-secondary">

        Quay lại

    </a>



</form>


</div>


</body>

</html>
