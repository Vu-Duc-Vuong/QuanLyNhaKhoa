<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sửa bệnh nhân</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>


<body>

<div class="container mt-5">

    <h2>Sửa bệnh nhân</h2>


    <form th:action="@{/patient/save}" method="post">


        <input type="hidden"
               name="id"
               th:value="${patient.id}">



        <div class="mb-3">
            <label>Mã bệnh nhân</label>

            <input type="text"
                   name="patientCode"
                   class="form-control"
                   th:value="${patient.patientCode}"
                   readonly>
        </div>



        <div class="mb-3">
            <label>Họ tên</label>

            <input type="text"
                   name="fullName"
                   class="form-control"
                   th:value="${patient.fullName}">
        </div>



        <div class="mb-3">
            <label>Ngày sinh</label>

            <input type="date"
                   name="dateOfBirth"
                   class="form-control"
                   th:value="${patient.dateOfBirth}">
        </div>



        <div class="mb-3">

            <label>Giới tính</label>

            <select name="gender"
                    class="form-control">

                <option th:selected="${patient.gender == 'Nam'}">
                    Nam
                </option>

                <option th:selected="${patient.gender == 'Nữ'}">
                    Nữ
                </option>

            </select>

        </div>



        <div class="mb-3">
            <label>Số điện thoại</label>

            <input type="text"
                   name="phone"
                   class="form-control"
                   th:value="${patient.phone}">
        </div>



        <div class="mb-3">
            <label>Địa chỉ</label>

            <input type="text"
                   name="address"
                   class="form-control"
                   th:value="${patient.address}">
        </div>



        <div class="mb-3">
            <label>CCCD</label>

            <input type="text"
                   name="cccd"
                   class="form-control"
                   th:value="${patient.cccd}">
        </div>



        <div class="mb-3">
            <label>Tiền sử bệnh</label>

            <textarea name="medicalHistory"
                      class="form-control"
                      th:text="${patient.medicalHistory}">
            </textarea>

        </div>



        <div class="mb-3">
            <label>Dị ứng</label>

            <textarea name="allergy"
                      class="form-control"
                      th:text="${patient.allergy}">
            </textarea>

        </div>



        <div class="mb-3">
            <label>Lý do khám</label>

            <textarea name="reason"
                      class="form-control"
                      th:text="${patient.reason}">
            </textarea>

        </div>



        <button class="btn btn-success">
            Cập nhật
        </button>


        <a href="/patient"
           class="btn btn-secondary">
            Quay lại
        </a>


    </form>


</div>

</body>

</html>
