<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm mới dịch vụ - Quản lý Nha khoa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #212529 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 px-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Quản lý Nha khoa</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="/service">Dịch vụ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white fw-bold fs-5 py-3">
                Thêm mới dịch vụ
            </div>
            <div class="card-body p-4">
                <form th:action="@{/service/save}" th:object="${serviceItem}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mã dịch vụ <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{serviceCode}" class="form-control" placeholder="Ví dụ: DV001" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên dịch vụ <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{serviceName}" class="form-control" placeholder="Nhập tên dịch vụ..." required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Đơn vị tính</label>
                            <input type="text" th:field="*{unit}" class="form-control" placeholder="Răng, Liệu trình, Hàm...">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Đơn giá (VNĐ)</label>
                            <input type="number" step="1000" th:field="*{price}" class="form-control" placeholder="0">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Mô tả chi tiết</label>
                        <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Nhập mô tả dịch vụ..."></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/service}" class="btn btn-secondary px-4">Hủy</a>
                        <button type="submit" class="btn btn-primary px-4">Lưu dịch vụ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
