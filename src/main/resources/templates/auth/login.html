<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Đăng nhập</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <style>

        body {

            background: linear-gradient(
                135deg,
                #74b9ff,
                #0984e3
            );

            height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

        }



        .login-card {

            width: 400px;

            background: white;

            padding: 35px;

            border-radius: 15px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.2);

        }



        .login-title {

            color: #0984e3;

            font-weight: bold;

        }



        .btn-login {

            background:#0984e3;

            border:none;

            padding:10px;

            font-size:16px;

        }



        .btn-login:hover {

            background:#0652DD;

        }



        input {

            border-radius:10px !important;

        }


    </style>


</head>



<body>


<div class="login-card">


    <h2 class="text-center login-title mb-4">

        Quản lý Nha khoa

    </h2>



    <h4 class="text-center mb-4">

        Đăng nhập

    </h4>





    <form th:action="@{/login}" method="post">


        <div class="mb-3">


            <label class="form-label">

                Tài khoản

            </label>


            <input

                type="text"

                name="username"

                class="form-control"

                placeholder="Nhập tài khoản"

                required>

        </div>





        <div class="mb-3">


            <label class="form-label">

                Mật khẩu

            </label>



            <input

                type="password"

                name="password"

                class="form-control"

                placeholder="Nhập mật khẩu"

                required>


        </div>





        <button

            class="btn btn-login text-white w-100">

            Đăng nhập

        </button>




        <!-- Đăng ký thành công -->

        <div
            th:if="${successMessage}"
            class="alert alert-success text-center mt-3"
            th:text="${successMessage}">
        </div>




        <!-- Sai tài khoản mật khẩu -->

        <div
            th:if="${errorMessage}"
            class="alert alert-danger text-center mt-3"
            th:text="${errorMessage}">
        </div>




        <!-- Đăng xuất thành công -->

        <div
            th:if="${param.logout}"
            class="alert alert-success text-center mt-3">

            Đăng xuất thành công

        </div>





        <div class="text-center mt-3">


            Chưa có tài khoản?


            <a href="/register">

                Đăng ký

            </a>


        </div>



    </form>



</div>



</body>

</html>
