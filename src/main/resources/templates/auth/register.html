<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Đăng ký</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5" style="max-width:500px">

    <h2 class="mb-4 text-center">
        Đăng ký
    </h2>

    <form
            th:action="@{/register}"
            method="post">

        <div class="mb-3">

            <label>Tên đăng nhập</label>

            <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>

        </div>

        <div class="mb-3">

            <label>Mật khẩu</label>

            <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

        </div>

        <button
                class="btn btn-success w-100">

            Đăng ký

        </button>

        <div class="mt-3 text-center">

            <a href="/login">

                Quay lại đăng nhập

            </a>

        </div>

    </form>

</div>

</body>
</html>
