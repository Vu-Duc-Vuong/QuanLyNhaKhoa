<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Doanh Thu - Nha Khoa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container py-4">
        <!-- Tiêu đề trang -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-primary mb-0">📊 BÁO CÁO DOANH THU & GIAO DỊCH</h3>
            <button onclick="location.reload()" class="btn btn-outline-primary btn-sm">🔄 Cập nhật dữ liệu</button>
        </div>

        <!-- 2 Thẻ Thống kê tổng quan (Cards) -->
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm bg-primary text-white">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase fw-semibold opacity-75">Tổng Doanh Thu</h6>
                        <h2 class="display-6 fw-bold mb-0" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">0 VNĐ</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm bg-success text-white">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase fw-semibold opacity-75">Tổng Số Lượng Hóa Đơn</h6>
                        <h2 class="display-6 fw-bold mb-0" th:text="${totalCount}">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bảng danh sách chi tiết hóa đơn -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="fw-bold mb-0 text-dark">📋 Danh Sách Giao Dịch Chi Tiết</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Mã HĐ</th>
                                <th>Tên Bệnh Nhân</th>
                                <th>Nội Dung Khám</th>
                                <th>Số Tiền (VNĐ)</th>
                                <th>Trạng Thái</th>
                                <th>Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Lặp qua danh sách hóa đơn từ Controller -->
                            <tr th:each="inv : ${invoices}">
                                <td class="fw-bold" th:text="${inv.id}">INV-1001</td>
                                <td th:text="${inv.patientName}">Nguyễn Văn A</td>
                                <td th:text="${inv.description}">Niềng răng</td>
                                <td class="fw-bold text-primary" th:text="${#numbers.formatDecimal(inv.amount, 0, 'COMMA', 0, 'POINT')}">1,000,000</td>
                                <td>
                                    <span class="badge bg-success" th:if="${inv.status == 'PAID'}">Đã thanh toán</span>
                                    <span class="badge bg-warning text-dark" th:if="${inv.status == 'PENDING'}">Chờ thanh toán</span>
                                </td>
                                <td>
                                    <a th:href="@{/invoice/checkout(id=${inv.id})}" class="btn btn-sm btn-outline-info">Xem / In</a>
                                </td>
                            </tr>
                            <!-- Dòng hiển thị khi danh sách trống -->
                            <tr th:if="${#lists.isEmpty(invoices)}">
                                <td colspan="6" class="text-center text-muted py-4">Chưa có dữ liệu hóa đơn nào.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
