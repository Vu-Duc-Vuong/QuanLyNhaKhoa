<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Hồ sơ khám bệnh</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>


<body class="d-flex flex-column min-vh-100">


<!-- Navbar -->
<div th:replace="~{layout/sidebar}"></div>



<!-- Nội dung -->

<div class="container mt-4 flex-grow-1">


    <h2 class="mb-2">
        Hồ sơ khám bệnh
        <span class="badge bg-secondary" th:text="${treatment.treatmentCode}"></span>
    </h2>


    <p class="text-muted">

        Bệnh nhân:
        <strong th:text="${treatment.appointment.patient.fullName}"></strong>

        &nbsp;|&nbsp; Mã bệnh nhân:
        <span th:text="${treatment.appointment.patient.patientCode}"></span>

        &nbsp;|&nbsp; Mã lịch hẹn:
        <span th:text="${treatment.appointment.appointmentCode}"></span>

        &nbsp;|&nbsp; Trạng thái:
        <span class="badge bg-info" th:text="${treatment.status}"></span>

    </p>



    <!-- ================= CHẨN ĐOÁN ================= -->

    <div class="card mb-4">

        <div class="card-header fw-bold">
            Chẩn đoán
        </div>

        <div class="card-body">

            <form th:action="@{/treatment/{id}/diagnosis(id=${treatment.id})}"
                  method="post">

                <div class="mb-3">

                    <label>Triệu chứng</label>

                    <textarea name="symptom"
                              class="form-control"
                              th:text="${treatment.symptom}"></textarea>

                </div>


                <div class="mb-3">

                    <label>Chẩn đoán</label>

                    <textarea name="diagnosis"
                              class="form-control"
                              th:text="${treatment.diagnosis}"></textarea>

                </div>


                <div class="mb-3">

                    <label>Ghi chú của bác sĩ</label>

                    <textarea name="note"
                              class="form-control"
                              th:text="${treatment.note}"></textarea>

                </div>


                <button class="btn btn-primary">
                    Lưu chẩn đoán
                </button>

            </form>

        </div>

    </div>



    <!-- ================= KÊ THUỐC ================= -->

    <div class="card mb-4">

        <div class="card-header fw-bold">
            Kê thuốc
        </div>

        <div class="card-body">

            <table class="table table-bordered table-sm">

                <thead class="table-light">
                <tr>
                    <th>Tên thuốc</th>
                    <th>Liều dùng</th>
                    <th>SL</th>
                    <th>Đơn vị</th>
                    <th>Ghi chú</th>
                    <th></th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="m : ${treatment.prescriptionItems}">

                    <td th:text="${m.medicineName}"></td>
                    <td th:text="${m.dosage}"></td>
                    <td th:text="${m.quantity}"></td>
                    <td th:text="${m.unit}"></td>
                    <td th:text="${m.note}"></td>

                    <td>
                        <a th:href="@{/treatment/{id}/medicine/delete/{itemId}(id=${treatment.id},itemId=${m.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa dòng thuốc này?')">
                            Xóa
                        </a>
                    </td>

                </tr>

                </tbody>

            </table>


            <form th:action="@{/treatment/{id}/medicine/add(id=${treatment.id})}"
                  method="post"
                  class="row g-2">

                <div class="col-md-3">
                    <input type="text" name="medicineName" class="form-control"
                           placeholder="Tên thuốc" required>
                </div>

                <div class="col-md-3">
                    <input type="text" name="dosage" class="form-control"
                           placeholder="Liều dùng">
                </div>

                <div class="col-md-2">
                    <input type="number" name="quantity" class="form-control"
                           placeholder="Số lượng">
                </div>

                <div class="col-md-2">
                    <input type="text" name="unit" class="form-control"
                           placeholder="Đơn vị">
                </div>

                <div class="col-md-1">
                    <input type="text" name="note" class="form-control"
                           placeholder="Ghi chú">
                </div>

                <div class="col-md-1">
                    <button class="btn btn-success w-100">+</button>
                </div>

            </form>

        </div>

    </div>



    <!-- ================= CHỈ ĐỊNH DỊCH VỤ ================= -->

    <div class="card mb-4">

        <div class="card-header fw-bold">
            Chỉ định dịch vụ
        </div>

        <div class="card-body">

            <table class="table table-bordered table-sm">

                <thead class="table-light">
                <tr>
                    <th>Tên dịch vụ</th>
                    <th>Đơn giá</th>
                    <th>SL</th>
                    <th>Thành tiền</th>
                    <th>Ghi chú</th>
                    <th></th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="s : ${treatment.serviceOrderItems}">

                    <td th:text="${s.serviceName}"></td>
                    <td th:text="${s.price}"></td>
                    <td th:text="${s.quantity}"></td>
                    <td th:text="${s.lineTotal}"></td>
                    <td th:text="${s.note}"></td>

                    <td>
                        <a th:href="@{/treatment/{id}/service/delete/{itemId}(id=${treatment.id},itemId=${s.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa dịch vụ này?')">
                            Xóa
                        </a>
                    </td>

                </tr>

                </tbody>

            </table>


            <form th:action="@{/treatment/{id}/service/add(id=${treatment.id})}"
                  method="post"
                  class="row g-2">

                <div class="col-md-4">
                    <input type="text" name="serviceName" class="form-control"
                           placeholder="Tên dịch vụ (vd: Nhổ răng, Trám răng...)" required>
                </div>

                <div class="col-md-2">
                    <input type="number" step="1000" name="price" class="form-control"
                           placeholder="Đơn giá">
                </div>

                <div class="col-md-2">
                    <input type="number" name="quantity" class="form-control"
                           value="1" placeholder="Số lượng">
                </div>

                <div class="col-md-3">
                    <input type="text" name="note" class="form-control"
                           placeholder="Ghi chú">
                </div>

                <div class="col-md-1">
                    <button class="btn btn-success w-100">+</button>
                </div>

            </form>


            <p class="text-end fw-bold mt-3">

                Tổng tiền dịch vụ:
                <span th:text="${treatment.totalAmount}"></span> đ

            </p>

        </div>

    </div>



    <!-- ================= HOÀN TẤT KHÁM ================= -->

    <div class="d-flex justify-content-between mb-5">

        <a href="/treatment" class="btn btn-secondary">
            Quay lại danh sách chờ
        </a>

        <form th:if="${treatment.status != 'Hoàn thành'}"
              th:action="@{/treatment/{id}/complete(id=${treatment.id})}"
              method="post">

            <button class="btn btn-success"
                    onclick="return confirm('Xác nhận hoàn tất khám? Hệ thống sẽ tạo hóa đơn thanh toán.')">

                Hoàn tất khám

            </button>

        </form>

    </div>

</div>



<!-- Footer -->

<div class="mt-auto"
     th:replace="~{layout/footer}">
</div>


</body>

</html>
