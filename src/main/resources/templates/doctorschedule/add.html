<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm mới lịch bác sĩ - Quản lý Nha khoa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #212529 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 px-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Quản lý Nha khoa</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="/schedule">Lịch bác sĩ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white fw-bold fs-5 py-3">
                Thêm mới lịch trực cho Bác sĩ
            </div>
            <div class="card-body p-4">
                <form th:action="@{/schedule/save}" th:object="${schedule}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên Bác sĩ <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{doctorName}" class="form-control" placeholder="Nhập tên bác sĩ..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Phòng khám</label>
                        <input type="text" th:field="*{clinicName}" class="form-control" placeholder="Ví dụ: Phòng Khám 01">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Ngày làm việc <span class="text-danger">*</span></label>
                            <input type="date" th:field="*{workDate}" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Ca làm việc</label>
                            <select th:field="*{shift}" class="form-select">
                                <option value="Ca sáng (08:00 - 12:00)">Ca sáng (08:00 - 12:00)</option>
                                <option value="Ca chiều (13:30 - 17:30)">Ca chiều (13:30 - 17:30)</option>
                                <option value="Ca tối (18:00 - 21:00)">Ca tối (18:00 - 21:00)</option>
                                <option value="Cả ngày">Cả ngày</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Trạng thái</label>
                        <select th:field="*{status}" class="form-select">
                            <option value="Đã xếp lịch">Đã xếp lịch</option>
                            <option value="Đang trực">Đang trực</option>
                            <option value="Đã hoàn thành">Đã hoàn thành</option>
                            <option value="Nghỉ">Nghỉ</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Ghi chú</label>
                        <textarea th:field="*{note}" class="form-control" rows="3" placeholder="Nhập ghi chú thêm nếu có..."></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/schedule}" class="btn btn-secondary px-4">Hủy</a>
                        <button type="submit" class="btn btn-primary px-4">Lưu lịch trực</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
