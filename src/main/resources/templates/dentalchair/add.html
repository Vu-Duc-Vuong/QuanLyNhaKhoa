<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm mới ghế nha khoa - Quản lý Nha khoa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #212529 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 px-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Quản lý Nha khoa</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="/chair">Ghế nha khoa</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white fw-bold fs-5 py-3">
                Thêm mới ghế nha khoa
            </div>
            <div class="card-body p-4">
                <form th:action="@{/chair/save}" th:object="${chair}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mã ghế <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{chairCode}" class="form-control" placeholder="Ví dụ: G001" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên / Số ghế <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{chairName}" class="form-control" placeholder="Nhập tên ghế..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Thuộc phòng khám</label>
                        <input type="text" th:field="*{clinicName}" class="form-control" placeholder="Nhập tên phòng khám...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Trạng thái</label>
                        <select th:field="*{status}" class="form-select">
                            <option value="Trống">Trống</option>
                            <option value="Đang sử dụng">Đang sử dụng</option>
                            <option value="Đang bảo trì">Đang bảo trì</option>
                            <option value="Hỏng">Hỏng</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Ghi chú / Mô tả</label>
                        <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Nhập thông tin mô tả ghế..."></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/chair}" class="btn btn-secondary px-4">Hủy</a>
                        <button type="submit" class="btn btn-primary px-4">Lưu ghế nha khoa</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
