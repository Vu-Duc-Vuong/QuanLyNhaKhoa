<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm mới phòng khám - Quản lý Nha khoa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #212529 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 px-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Quản lý Nha khoa</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="/clinic">Phòng khám</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white fw-bold fs-5 py-3">
                Thêm mới phòng khám
            </div>
            <div class="card-body p-4">
                <form th:action="@{/clinic/save}" th:object="${clinic}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mã phòng <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{clinicCode}" class="form-control" placeholder="Ví dụ: PK001" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên phòng khám <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{clinicName}" class="form-control" placeholder="Nhập tên phòng khám..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Vị trí</label>
                        <input type="text" th:field="*{location}" class="form-control" placeholder="Ví dụ: Tầng 1 - Phòng 101">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Trạng thái</label>
                        <select th:field="*{status}" class="form-select">
                            <option value="Hoạt động">Hoạt động</option>
                            <option value="Đang bảo trì">Đang bảo trì</option>
                            <option value="Tạm đóng">Tạm đóng</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/clinic}" class="btn btn-secondary px-4">Hủy</a>
                        <button type="submit" class="btn btn-primary px-4">Lưu phòng khám</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
