<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm mới thuốc - Quản lý Nha khoa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #212529 !important; }
    </style>
</head>
<body>

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 px-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Quản lý Nha khoa</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/patient">Bệnh nhân</a></li>
                    <li class="nav-item"><a class="nav-link" href="/appointment">Lịch hẹn</a></li>
                    <li class="nav-item"><a class="nav-link" href="/treatment">Khám bệnh</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="/medicine">Thuốc</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white fw-bold fs-5 py-3">
                Thêm mới thuốc
            </div>
            <div class="card-body p-4">
                <form th:action="@{/medicine/save}" th:object="${medicine}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mã thuốc <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{medicineCode}" class="form-control" placeholder="Ví dụ: MED001" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên thuốc <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{medicineName}" class="form-control" placeholder="Nhập tên thuốc..." required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Đơn vị tính</label>
                            <input type="text" th:field="*{unit}" class="form-control" placeholder="Viên, Hộp, Vỉ...">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Đơn giá (VNĐ)</label>
                            <input type="number" step="500" th:field="*{price}" class="form-control" placeholder="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Số lượng nhập</label>
                            <input type="number" th:field="*{quantity}" class="form-control" placeholder="0">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Ghi chú / Hướng dẫn</label>
                        <textarea th:field="*{note}" class="form-control" rows="3" placeholder="Nhập ghi chú hoặc cách dùng..."></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/medicine}" class="btn btn-secondary px-4">Hủy</a>
                        <button type="submit" class="btn btn-primary px-4">Lưu thuốc</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
