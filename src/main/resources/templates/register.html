<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #111827;
            --card: rgba(255, 255, 255, 0.95);
            --text: #0f172a;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --border: rgba(15, 23, 42, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(59, 130, 246, 0.24), transparent 24%),
                radial-gradient(circle at bottom left, rgba(14, 165, 233, 0.18), transparent 28%),
                linear-gradient(135deg, #020617 0%, #0f172a 52%, #1e3a8a 100%);
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
        }
        .card {
            width: min(760px, 100%);
            border-radius: 30px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 32px 90px rgba(15, 23, 42, 0.36);
            backdrop-filter: blur(18px);
            padding: 34px;
        }
        .topline {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 22px;
        }
        .badge {
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-dark);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }
        h1 {
            margin: 8px 0 6px;
            font-size: 30px;
        }
        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }
        .alert {
            margin: 16px 0 0;
            padding: 12px 14px;
            border-radius: 14px;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            font-size: 14px;
        }
        .alert.error {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #fecaca;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .full {
            grid-column: 1 / -1;
        }
        label {
            display: block;
            margin: 0 0 8px;
            font-size: 14px;
            font-weight: 700;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: white;
            font-size: 15px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: rgba(37, 99, 235, 0.5);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }
        .actions {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button {
            border: 0;
            border-radius: 14px;
            padding: 14px 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .link {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }
        .link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        @media (max-width: 720px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .topline {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<section class="card">
    <div class="topline">
        <div>
            <span class="badge">Tạo tài khoản</span>
            <h1>Đăng ký người dùng mới</h1>
            <p>Khởi tạo tài khoản bệnh nhân hoặc nhân viên cho hệ thống quản lý nha khoa.</p>
        </div>
    </div>

    <div class="alert" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <div class="grid">
            <div>
                <label for="fullName">Họ và tên</label>
                <input id="fullName" type="text" th:field="*{fullName}" placeholder="Nguyễn Văn A" required>
            </div>
            <div>
                <label for="phone">Số điện thoại</label>
                <input id="phone" type="text" th:field="*{phone}" placeholder="0901234567" required>
            </div>
            <div class="full">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" placeholder="example@gmail.com">
            </div>
            <div>
                <label for="password">Mật khẩu</label>
                <input id="password" type="password" th:field="*{password}" placeholder="••••••••" required>
            </div>
            <div>
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input id="confirmPassword" type="password" th:field="*{confirmPassword}" placeholder="••••••••" required>
            </div>
            <div>
                <label for="role">Vai trò</label>
                <select id="role" th:field="*{role}">
                    <option value="PATIENT">PATIENT</option>
                    <option value="RECEPTIONIST">RECEPTIONIST</option>
                    <option value="DENTIST">DENTIST</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div>
                <label for="status">Trạng thái</label>
                <select id="status" th:field="*{status}">
                    <option value="true">Hoạt động</option>
                    <option value="false">Tạm khóa</option>
                </select>
            </div>
        </div>

        <div class="actions">
            <button type="submit">Đăng ký</button>
            <div class="link">Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></div>
        </div>
    </form>
</section>
</body>
</html>
