<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Đăng ký</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <style>

        body {

            background: linear-gradient(
                135deg,
                #74b9ff,
                #0984e3
            );

            min-height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

        }



        .register-card {

            width:450px;

            background:white;

            padding:35px;

            border-radius:15px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.2);

        }



        .register-title {

            color:#0984e3;

            font-weight:bold;

        }



        .btn-register {

            background:#0984e3;

            border:none;

            padding:10px;

            font-size:16px;

        }



        .btn-register:hover {

            background:#0652DD;

        }



        input {

            border-radius:10px !important;

        }


    </style>


</head>


<body>


<div class="register-card">


    <h2 class="text-center register-title mb-4">

        Quản lý y khoa

    </h2>



    <h4 class="text-center mb-4">

        Đăng ký tài khoản

    </h4>




    <form th:action="@{/register}" method="post">



        <div class="mb-3">

            <label class="form-label">
                Họ và tên
            </label>


            <input
                    type="text"
                    name="fullName"
                    class="form-control"
                    placeholder="Nhập họ tên"
                    required>

        </div>





        <div class="mb-3">

            <label class="form-label">
                Tên đăng nhập
            </label>


            <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Nhập tài khoản"
                    required>


        </div>





        <div class="mb-3">

            <label class="form-label">
                Email
            </label>


            <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Nhập email"
                    required>


        </div>





        <div class="mb-3">

            <label class="form-label">
                Số điện thoại
            </label>


            <input
                    type="text"
                    name="phone"
                    class="form-control"
                    placeholder="Nhập số điện thoại"
                    required>


        </div>





        <div class="mb-3">

            <label class="form-label">
                Mật khẩu
            </label>


            <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Nhập mật khẩu"
                    required>


        </div>





        <button 
            class="btn btn-register text-white w-100">


            Đăng ký


        </button>





        <div class="text-center mt-3">


            Đã có tài khoản?


            <a href="/login">

                Đăng nhập

            </a>


        </div>



    </form>



</div>


</body>

</html>
