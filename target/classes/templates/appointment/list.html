<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Danh sách lịch hẹn</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">


<link rel="stylesheet" th:href="@{/css/style.css}">

</head>


<body class="d-flex flex-column min-vh-100">



<!-- Navbar -->

<div th:replace="~{layout/sidebar}"></div>





<!-- Nội dung -->

<div class="container mt-4 flex-grow-1">



    <h2 class="mb-4">

        Danh sách lịch hẹn

    </h2>





    <a th:href="@{/appointment/add}"
       class="btn btn-primary mb-3">

        + Thêm lịch hẹn

    </a>





    <!-- Tìm kiếm lịch hẹn -->

    <form th:action="@{/appointment/search}"
          method="get"
          class="d-flex mb-3">


        <input type="text"
               name="keyword"
               class="form-control me-2"
               placeholder="Nhập mã lịch hoặc tên bệnh nhân">


        <button class="btn btn-success">

            Tìm kiếm

        </button>


    </form>







    <table class="table table-bordered table-hover">


        <thead class="table-dark">

        <tr>

            <th>Mã lịch</th>

            <th>Bệnh nhân</th>

            <th>Ngày</th>

            <th>Giờ</th>

            <th>Trạng thái</th>

            <th>Chức năng</th>

        </tr>


        </thead>







        <tbody>


        <tr th:each="a : ${appointments}">



            <td th:text="${a.appointmentCode}"></td>




            <td th:text="${a.patient != null ? a.patient.fullName : 'Chưa có'}"></td>




            <td th:text="${a.appointmentDate}"></td>




            <td th:text="${a.appointmentTime}"></td>






            <td>

                <span class="badge bg-info"
                      th:text="${a.status}">
                </span>

            </td>








            <td>



                <!-- Sửa -->

                <a th:href="@{/appointment/edit/{id}(id=${a.id})}"
                   class="btn btn-warning btn-sm">

                    Sửa

                </a>






                <!-- Check-in -->

                <a th:if="${a.status == 'Chờ khám'}"
                   th:href="@{/appointment/status/{id}/{status}(id=${a.id},status='Đã check-in')}"
                   class="btn btn-success btn-sm">

                    Check-in

                </a>






                <!-- Bắt đầu khám -->

                <a th:if="${a.status == 'Đã check-in'}"
                   th:href="@{/appointment/status/{id}/{status}(id=${a.id},status='Đang khám')}"
                   class="btn btn-warning btn-sm">

                    Bắt đầu khám

                </a>







                <!-- Hoàn thành -->

                <a th:if="${a.status == 'Đang khám'}"
                   th:href="@{/appointment/status/{id}/{status}(id=${a.id},status='Hoàn thành')}"
                   class="btn btn-primary btn-sm">

                    Hoàn thành

                </a>







                <!-- Xóa -->

                <a th:href="@{/appointment/delete/{id}(id=${a.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc muốn xóa lịch hẹn này?')">

                    Xóa

                </a>



            </td>



        </tr>



        </tbody>



    </table>



</div>






<!-- Footer -->

<div class="mt-auto"
     th:replace="~{layout/footer}">
</div>





</body>

</html>
