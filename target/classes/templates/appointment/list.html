<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Danh sách lịch hẹn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body>


<div class="container mt-5">


<h2>
Danh sách lịch hẹn
</h2>


<a href="/appointment/add"
class="btn btn-primary mb-3">

+ Thêm lịch hẹn

</a>



<table class="table table-bordered">


<tr class="table-dark">

<th>Mã lịch</th>
<th>Bệnh nhân</th>
<th>Ngày</th>
<th>Giờ</th>
<th>Trạng thái</th>
<th>Chức năng</th>

</tr>



<tr th:each="a : ${appointments}">


<td th:text="${a.appointmentCode}"></td>


<td th:text="${a.patient.fullName}"></td>


<td th:text="${a.appointmentDate}"></td>


<td th:text="${a.appointmentTime}"></td>


<td th:text="${a.status}"></td>


<td>


<a th:if="${a.status == 'Chờ khám'}"
th:href="@{/appointment/status/{id}/{status}
(id=${a.id},status='Đã check-in')}"
class="btn btn-success btn-sm">

Check-in

</a>



<a th:if="${a.status == 'Đã check-in'}"
th:href="@{/appointment/status/{id}/{status}
(id=${a.id},status='Đang khám')}"
class="btn btn-warning btn-sm">

Bắt đầu khám

</a>




<a th:if="${a.status == 'Đang khám'}"
th:href="@{/appointment/status/{id}/{status}
(id=${a.id},status='Hoàn thành')}"
class="btn btn-primary btn-sm">

Hoàn thành

</a>




<a th:href="@{/appointment/delete/{id}(id=${a.id})}"
class="btn btn-danger btn-sm"
onclick="return confirm('Bạn có chắc muốn xóa?')">

Xóa

</a>


</td>


</tr>


</table>


</div>


</body>

</html>
