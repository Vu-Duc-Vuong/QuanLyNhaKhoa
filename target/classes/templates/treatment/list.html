<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Khám bệnh - Danh sách chờ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>


<body class="d-flex flex-column min-vh-100">


<!-- Navbar -->
<div th:replace="~{layout/sidebar}"></div>



<!-- Nội dung -->

<div class="container mt-4 flex-grow-1">


    <h2 class="mb-4">
        Danh sách bệnh nhân chờ khám
    </h2>


    <!-- Thông báo hoàn tất khám -->
    <div th:if="${success}"
         class="alert alert-success">

        <span th:text="${success}"></span>

    </div>



    <!-- Tìm kiếm hồ sơ khám đã lưu -->
    <form th:action="@{/treatment/search}"
          method="get"
          class="d-flex mb-3">

        <input type="text"
               name="keyword"
               class="form-control me-2"
               placeholder="Tìm hồ sơ khám theo mã hoặc tên bệnh nhân">

        <button class="btn btn-success">
            Tìm kiếm
        </button>

    </form>



    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>Mã lịch hẹn</th>
            <th>Bệnh nhân</th>
            <th>SĐT</th>
            <th>Ngày hẹn</th>
            <th>Giờ hẹn</th>
            <th>Ghi chú lịch hẹn</th>
            <th>Chức năng</th>
        </tr>
        </thead>


        <tbody>

        <tr th:each="a : ${appointments}">

            <td th:text="${a.appointmentCode}"></td>

            <td th:text="${a.patient != null ? a.patient.fullName : 'Chưa có'}"></td>

            <td th:text="${a.patient != null ? a.patient.phone : ''}"></td>

            <td th:text="${a.appointmentDate}"></td>

            <td th:text="${a.appointmentTime}"></td>

            <td th:text="${a.note}"></td>

            <td>

                <a th:href="@{/treatment/exam/{id}(id=${a.id})}"
                   class="btn btn-primary btn-sm">

                    Vào khám

                </a>

            </td>

        </tr>


        <tr th:if="${#lists.isEmpty(appointments)}">

            <td colspan="7" class="text-center text-muted">

                Hiện không có bệnh nhân nào đang chờ khám

            </td>

        </tr>

        </tbody>

    </table>

</div>



<!-- Footer -->

<div class="mt-auto"
     th:replace="~{layout/footer}">
</div>


</body>

</html>
