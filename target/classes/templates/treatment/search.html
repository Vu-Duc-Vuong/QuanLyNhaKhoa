<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Tìm kiếm hồ sơ khám</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>


<body class="d-flex flex-column min-vh-100">


<!-- Navbar -->
<div th:replace="~{layout/sidebar}"></div>



<!-- Nội dung -->

<div class="container mt-4 flex-grow-1">


    <h2 class="mb-4">
        Kết quả tìm kiếm hồ sơ khám: "<span th:text="${keyword}"></span>"
    </h2>


    <a href="/treatment" class="btn btn-secondary mb-3">
        Quay lại danh sách chờ
    </a>


    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>Mã hồ sơ khám</th>
            <th>Bệnh nhân</th>
            <th>Chẩn đoán</th>
            <th>Trạng thái</th>
            <th>Tổng tiền</th>
            <th>Ngày tạo</th>
            <th>Chức năng</th>
        </tr>
        </thead>


        <tbody>

        <tr th:each="t : ${treatments}">

            <td th:text="${t.treatmentCode}"></td>

            <td th:text="${t.appointment != null and t.appointment.patient != null ? t.appointment.patient.fullName : ''}"></td>

            <td th:text="${t.diagnosis}"></td>

            <td>
                <span class="badge bg-info" th:text="${t.status}"></span>
            </td>

            <td th:text="${t.totalAmount}"></td>

            <td th:text="${t.createdDate}"></td>

            <td>
                <a th:if="${t.appointment != null}"
                   th:href="@{/treatment/exam/{id}(id=${t.appointment.id})}"
                   class="btn btn-primary btn-sm">
                    Xem
                </a>
            </td>

        </tr>


        <tr th:if="${#lists.isEmpty(treatments)}">

            <td colspan="7" class="text-center text-muted">
                Không tìm thấy hồ sơ khám nào
            </td>

        </tr>

        </tbody>

    </table>

</div>



<!-- Footer -->

<div class="mt-auto"
     th:replace="~{layout/footer}">
</div>


</body>

</html>
